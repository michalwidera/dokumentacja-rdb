name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_TAG=$(curl -sL https://api.github.com/repos/rust-lang/mdBook/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          curl -sL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_TAG}/mdbook-${MDBOOK_TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Install mdbook-mermaid
        run: |
          cargo install mdbook-mermaid
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q pandoc \
            texlive-xetex texlive-lang-polish texlive-latex-extra \
            fonts-dejavu librsvg2-bin imagemagick

      - name: Build
        run: |
          mdbook-mermaid install .
          mdbook build

      - name: Generate PDF
        run: |
          cat > /tmp/fix_math.lua << 'LUAEOF'
          function Math(elem)
              local text = elem.text
              -- \\X → \X: double-escaped specials written for Markdown, need single for LaTeX
              text = text:gsub("\\\\([{}!,;:#&%%])", "\\%1")
              -- \\\\ → \\: Markdown-escaped LaTeX line-break (array row separator)
              text = text:gsub("\\\\\\\\", "\\\\")
              return pandoc.Math(elem.mathtype, text)
          end
          LUAEOF

          FILES=$(grep -oE '\([^)]+\.md\)' SUMMARY.md | tr -d '()' | while read f; do
            [ -f "$f" ] && echo "$f"
          done)

          # <figure><img> HTML blocks are silently dropped by XeLaTeX.
          # Convert to Markdown ![caption](abs_path) and resolve all relative paths.
          python3 - $FILES << 'PYEOF'
          import re, sys, subprocess, os
          from pathlib import Path
          def fix_figure(m, d):
              src_m = re.search(r'src="([^"]+)"', m.group(0))
              if not src_m:
                  return m.group(0)
              src = src_m.group(1)
              cap_m = re.search(r'<figcaption[^>]*>(.*?)</figcaption>', m.group(0), re.DOTALL)
              cap = re.sub(r'<[^>]+>', '', cap_m.group(1)).strip() if cap_m else ''
              if not src.startswith(('http://', 'https://', '/')):
                  src = str((d / src).resolve())
              if src.lower().endswith('.gif'):
                  png = src[:-4] + '.png'
                  if not os.path.exists(png):
                      subprocess.run(['convert', src + '[0]', png], check=False)
                  src = png if os.path.exists(png) else None
              if not src:
                  return (f'*[{cap}]*\n' if cap else '')
              return f'![{cap}]({src})\n'
          parts = []
          for filepath in sys.argv[1:]:
              d = Path(filepath).parent.resolve()
              text = Path(filepath).read_text()
              text = re.sub(r'<figure>.*?</figure>', lambda m, d=d: fix_figure(m, d), text, flags=re.DOTALL)
              def fix_img(m, d=d):
                  alt, src = m.group(1), m.group(2)
                  if src.startswith(('http://', 'https://', '/')):
                      return m.group(0)
                  return f'![{alt}]({(d / src).resolve()})'
              text = re.sub(r'!\[([^\]]*)\]\(([^)\s]+)\)', fix_img, text)
              parts.append(text)
          Path('/tmp/combined.md').write_text('\n\n'.join(parts))
          PYEOF

          pandoc /tmp/combined.md \
            --from markdown+tex_math_double_backslash \
            --lua-filter /tmp/fix_math.lua \
            --pdf-engine=xelatex \
            --toc --toc-depth=2 \
            --top-level-division=chapter \
            --standalone \
            -V lang=pl \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            -V documentclass=report \
            -V mainfont="DejaVu Serif" \
            --metadata title="RetractorDB" \
            --metadata subtitle="Edge Signal Processing Engine" \
            --metadata author="Michal Widera" \
            --metadata date="$(date +%Y-%m-%d)" \
            -o book/retractordb.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        run: |
          curl -sSL https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q pandoc \
            texlive-xetex texlive-lang-polish texlive-latex-extra \
            fonts-dejavu

      - name: Build
        run: |
          mdbook-mermaid install .
          mdbook build

      - name: Generate PDF
        run: |
          FILES=$(grep -oE '\([^)]+\.md\)' SUMMARY.md | tr -d '()' | while read f; do
            [ -f "$f" ] && echo "$f"
          done | tr '\n' ' ')
          pandoc $FILES \
            --pdf-engine=xelatex \
            --toc --toc-depth=2 \
            --top-level-division=chapter \
            --standalone \
            -V lang=pl \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            -V documentclass=report \
            -V mainfont="DejaVu Serif" \
            --metadata title="RetractorDB" \
            --metadata subtitle="Edge Signal Processing Engine" \
            --metadata author="Michal Widera" \
            --metadata date="$(date +%Y-%m-%d)" \
            -o book/retractordb.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

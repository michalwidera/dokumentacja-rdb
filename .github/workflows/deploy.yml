name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[nobuild]')"
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_TAG=$(curl -sL https://api.github.com/repos/rust-lang/mdBook/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          curl -sL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_TAG}/mdbook-${MDBOOK_TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Install mdbook-mermaid
        run: |
          cargo install mdbook-mermaid
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Pandoc and LaTeX
        if: "!contains(github.event.head_commit.message, '[skippdf]')"
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q pandoc \
            texlive-xetex texlive-lang-polish texlive-latex-extra \
            fonts-dejavu librsvg2-bin imagemagick

      - name: Install mermaid-cli
        if: "!contains(github.event.head_commit.message, '[skippdf]')"
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build
        run: |
          mdbook-mermaid install .
          mdbook build

      - name: Generate PDF
        if: "!contains(github.event.head_commit.message, '[skippdf]')"
        run: |
          printf '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer.json

          cat > /tmp/header.tex << 'TEXEOF'
          \usepackage{caption}
          \usepackage{amssymb}
          \usepackage{tcolorbox}
          \let\origmaketitle\maketitle
          \renewcommand{\maketitle}{\AtEndDocument{\clearpage\origmaketitle}}
          \usepackage{titlesec}
          \titlelabel{\thetitle.\quad}
          \usepackage{tocloft}
          \renewcommand{\cftchapaftersnum}{.}
          \renewcommand{\cftsecaftersnum}{.}
          \renewcommand{\cftchapleader}{\cftdotfill{\cftdotsep}}
          \cftsetpnumwidth{2.5em}
          \cftsetrmarg{3em}
          \tcbuselibrary{breakable}
          \captionsetup{labelformat=empty,labelsep=none}
          \newtcolorbox{calloutUwaga}{breakable,colback=green!8,colframe=green!45!black,fonttitle=\bfseries,title={Uwaga}}
          \newtcolorbox{calloutInfo}{breakable,colback=cyan!6,colframe=cyan!55!black,fonttitle=\bfseries,title={Info}}
          \newtcolorbox{calloutOstrzezenie}{breakable,colback=orange!10,colframe=orange!70!black,fonttitle=\bfseries,title={Ostrzeżenie}}
          \newtcolorbox{calloutNote}{breakable,colback=blue!6,colframe=blue!50!black,fonttitle=\bfseries,title={Uwaga}}
          TEXEOF

          cat > /tmp/cover.tex << COVEOF
          \thispagestyle{empty}
          \newgeometry{margin=0cm}
          \includegraphics[width=\paperwidth,height=\paperheight]{${PWD}/assets/book-cover.png}
          \restoregeometry
          \clearpage
          COVEOF

          cat > /tmp/fix_math.lua << 'LUAEOF'
          function Math(elem)
              local text = elem.text
              -- \\X → \X: double-escaped specials written for Markdown, need single for LaTeX
              text = text:gsub("\\\\([{}!,;:#&%%])", "\\%1")
              -- \\\\ → \\: Markdown-escaped LaTeX line-break (array row separator)
              text = text:gsub("\\\\\\\\", "\\\\")
              return pandoc.Math(elem.mathtype, text)
          end
          LUAEOF

          cat > /tmp/callouts.lua << 'CALLUAEOF'
          local envs = {Uwaga="calloutUwaga", Info="calloutInfo",
                        ["Ostrzeżenie"]="calloutOstrzezenie", NOTE="calloutNote",
                        Pobierz="calloutInfo"}
          local function get_env(text)
              for k, v in pairs(envs) do
                  if text:find(k, 1, true) then return v end
              end
          end
          function BlockQuote(el)
              if #el.content == 0 then return el end
              local first = el.content[1]
              if first.t ~= "Para" or #first.content == 0 then return el end
              local head = first.content[1]
              if head.t ~= "Strong" then return el end
              local env = get_env(pandoc.utils.stringify(head))
              if not env then return el end
              local body = {}
              local rest = {}
              for i = 2, #first.content do table.insert(rest, first.content[i]) end
              while #rest > 0 and rest[1].t == "Space" do table.remove(rest, 1) end
              if #rest > 0 then table.insert(body, pandoc.Para(rest)) end
              for i = 2, #el.content do table.insert(body, el.content[i]) end
              local out = {pandoc.RawBlock("latex", "\\begin{"..env.."}")}
              for _, b in ipairs(body) do table.insert(out, b) end
              table.insert(out, pandoc.RawBlock("latex", "\\end{"..env.."}"))
              return out
          end
          CALLUAEOF

          FILES=$(grep -oE '\([^)]+\.md\)' SUMMARY.md | tr -d '()' | while read f; do
            [ -f "$f" ] && echo "$f"
          done)

          # <figure><img> HTML blocks are silently dropped by XeLaTeX.
          # Convert to Markdown ![caption](abs_path) and resolve all relative paths.
          python3 - $FILES << 'PYEOF'
          import re, sys, subprocess, os
          from pathlib import Path
          MERMAID_DIR = '/tmp/mermaid'
          os.makedirs(MERMAID_DIR, exist_ok=True)
          mermaid_n = [0]
          def render_mermaid(m):
              mermaid_n[0] += 1
              idx = mermaid_n[0]
              mmd = f'{MERMAID_DIR}/d{idx}.mmd'
              png = f'{MERMAID_DIR}/d{idx}.png'
              Path(mmd).write_text(m.group(1).strip())
              subprocess.run(['mmdc', '-i', mmd, '-o', png, '-p', '/tmp/puppeteer.json'], capture_output=True)
              return f'![Diagram]({png})\n' if os.path.exists(png) else m.group(0)
          def fix_figure(m, d):
              src_m = re.search(r'src="([^"]+)"', m.group(0))
              if not src_m:
                  return m.group(0)
              src = src_m.group(1)
              cap_m = re.search(r'<figcaption[^>]*>(.*?)</figcaption>', m.group(0), re.DOTALL)
              cap = re.sub(r'<[^>]+>', '', cap_m.group(1)).strip() if cap_m else ''
              if not src.startswith(('http://', 'https://', '/')):
                  src = str((d / src).resolve())
              if src.lower().endswith('.gif'):
                  png = src[:-4] + '.png'
                  if not os.path.exists(png):
                      subprocess.run(['convert', src + '[0]', png], check=False)
                  src = png if os.path.exists(png) else None
              if not src:
                  return (f'*[{cap}]*\n' if cap else '')
              return f'![{cap}]({src})\n'
          parts = []
          for filepath in sys.argv[1:]:
              d = Path(filepath).parent.resolve()
              text = Path(filepath).read_text()
              text = text.replace('✔', '$\\checkmark$')
              text = re.sub(r'```mermaid\n(.*?)```', render_mermaid, text, flags=re.DOTALL)
              text = re.sub(r'<figure>.*?</figure>', lambda m, d=d: fix_figure(m, d), text, flags=re.DOTALL)
              def fix_img(m, d=d):
                  alt, src = m.group(1), m.group(2)
                  if src.startswith(('http://', 'https://', '/')):
                      return m.group(0)
                  return f'![{alt}]({(d / src).resolve()})'
              text = re.sub(r'!\[([^\]]*)\]\(([^)\s]+)\)', fix_img, text)
              parts.append(text)
          Path('/tmp/combined.md').write_text('\n\n'.join(parts))
          PYEOF

          pandoc /tmp/combined.md \
            --from markdown+tex_math_double_backslash \
            --lua-filter /tmp/callouts.lua \
            --lua-filter /tmp/fix_math.lua \
            --include-in-header=/tmp/header.tex \
            --include-before-body=/tmp/cover.tex \
            --pdf-engine=xelatex \
            --number-sections \
            --toc --toc-depth=2 \
            --top-level-division=chapter \
            -V secnumdepth=1 \
            --standalone \
            -V lang=pl \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            -V documentclass=report \
            -V mainfont="DejaVu Serif" \
            --metadata title="RetractorDB" \
            --metadata subtitle="Edge Signal Processing Engine" \
            --metadata author="Michal Widera" \
            --metadata date="$(date +%Y-%m-%d)" \
            -o book/retractordb.pdf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
